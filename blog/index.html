<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>블로그</title>
        <link rel="stylesheet" href="../css/global.css" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/katex/dist/katex.min.css"
        />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
        <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:wght@400..700&display=swap" rel="stylesheet" onerror="this.onerror=null;this.href='';">

        <style>
            /* 캔버스 고정 */
            #halftone-canvas {
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                z-index: -1;
                pointer-events: none;
            }

            /* 마크다운 본문 */
            #content a {
                color: #888;
                text-decoration: none;
            }
            #content a:hover {
                color: #fff;
            }
        </style>
    </head>
    <body>
        <canvas id="halftone-canvas"></canvas>

        <main
            style="
                position: relative;
                z-index: 1;
                padding: 3rem;
                max-width: 800px;
                margin: 0 auto;
            "
        >
            <h1 id="page-title" style="font-size: 2rem; margin-bottom: 1rem">블로그</h1>
            <div id="tag-container"></div>
            <hr
                style="
                    border: none;
                    height: 1px;
                    margin-bottom: 2rem;
                    visibility: hidden;
                    width: 100%;
                    margin: 1rem auto;
                "
            />
            <div id="content" style="line-height: 1.8">로딩 중...</div>
        </main>
        
        <aside id="floating-toc"></aside>

        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/katex/dist/katex.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/marked-katex-extension/lib/index.umd.js"></script>

        <script type="module" src="./blog.js"></script>
    </body>
</html>
