<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SuwonJ</title>
        <link rel="stylesheet" href="/css/global.css" />
        <style>
            #halftone-canvas {
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                z-index: -1;
            }

            main {
                position: relative;
                pointer-events: none;
                /* global.css의 wide-screen margin-left 오버라이드 */
                margin-left: auto !important;
                margin-right: auto !important;
            }

            .landing-icons {
                display: flex;
                justify-content: center;
                gap: 2rem;
                margin-top: 2rem;
                pointer-events: auto;
            }

            .landing-icons a {
                display: flex;
                opacity: 0.25;
                transition: opacity 0.25s;
            }

            .landing-icons a:hover {
                opacity: 0.7;
            }

            .landing-icons svg {
                width: 20px;
                height: 20px;
                fill: #fff;
            }
        </style>
    </head>
    <body>
        <canvas id="halftone-canvas"></canvas>

        <main style="padding: 3rem; text-align: center; margin-top: 10vh">
            <h1 style="font-size: 3rem; color: #fff">SuwonJ</h1>

        </main>

        <script type="module">
            import { renderNavbar } from "/components/navbar.js";
            import { HalftoneBackground } from "/components/halftone.js";

            renderNavbar();

            const bg = new HalftoneBackground("halftone-canvas", {
                iconSrc: "/assets/suwonjiconwhite.svg",
                iconScale: 0.38,
            });
            bg.init();

            // 아이콘 호버 → 해당 서비스 로고로 하프톤 배경 전환
            document.querySelectorAll(".landing-icons a").forEach(link => {
                link.addEventListener("mouseenter", () => {
                    bg.setIcon(link.dataset.logo);
                });
                link.addEventListener("mouseleave", () => {
                    bg.setIcon("/assets/suwonjiconwhite.svg");
                });
            });
        </script>
    </body>
</html>
