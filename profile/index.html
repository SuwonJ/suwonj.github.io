<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SuwonJ — 소개</title>
        <meta name="description" content="숭실대학교 AI소프트웨어학부 재학 중인 SuwonJ의 개인 소개 페이지." />
        <link rel="stylesheet" href="../css/global.css" />

        <style>
            #halftone-canvas {
                position: fixed;
                top: 0; left: 0;
                width: 100vw; height: 100vh;
                z-index: -1;
                pointer-events: none;
            }

            /* ── hr 투명화 (하프톤 도트만 표시) ── */
            hr {
                border: none;
                height: 1px;
                background: transparent;
                margin: 2.5rem 0;
            }

            /* ── 공통 섹션 ── */
            .profile-section {
                margin-bottom: 3.5rem;
            }

            .section-label {
                font-size: 0.75rem;
                color: #444;
                letter-spacing: 0.18em;
                text-transform: uppercase;
                margin-bottom: 1.5rem;
                font-family: monospace;
            }

            /* ── Hero ── */
            .profile-hero {
                padding: 3rem 0 1.5rem;
            }

            .profile-hero h1 {
                font-size: 3rem;
                color: #fff;
                margin: 0 0 0.6rem;
            }

            .profile-tagline {
                color: #555;
                font-size: 1rem;
                margin: 0;
                font-family: monospace;
            }

            /* ── About ── */
            .about-text {
                color: #999;
                line-height: 1.95;
                margin-bottom: 1rem;
            }

            .about-text:last-of-type {
                margin-bottom: 1.5rem;
            }

            .interest-tags {
                display: flex;
                flex-wrap: wrap;
                gap: 0.5rem;
            }

            .interest-tag {
                font-family: monospace;
                font-size: 0.8rem;
                color: #555;
                padding: 0.2rem 0.7rem;
                border: 1px solid #2a2a2a;
                border-radius: 2px;
                transition: color 0.2s, border-color 0.2s;
                cursor: default;
            }

            .interest-tag:hover {
                color: #ccc;
                border-color: #555;
            }

            /* ── Skills (하프톤 도트 숙련도) ── */
            .skills-list {
                display: flex;
                flex-direction: column;
                gap: 1.2rem;
            }

            .skill-item {
                display: flex;
                align-items: center;
                gap: 1.2rem;
            }

            .skill-name {
                font-family: monospace;
                color: #ccc;
                font-size: 0.95rem;
                min-width: 70px;
            }

            .skill-dots {
                display: flex;
                align-items: center;
                gap: 6px;
            }

            .skill-dot {
                border-radius: 50%;
                background: #fff;
                transition: transform 0.2s;
            }

            .skill-dot.filled {
                opacity: 1;
            }

            .skill-dot.empty {
                opacity: 0.08;
            }

            /* ── Timeline ── */
            .timeline {
                display: flex;
                flex-direction: column;
                gap: 2rem;
                border-left: 1px solid #222;
                padding-left: 1.8rem;
                margin-left: 0.3rem;
            }

            .timeline-item {
                position: relative;
            }

            .timeline-item::before {
                content: '';
                position: absolute;
                left: -2.1rem;
                top: 0.45rem;
                width: 5px;
                height: 5px;
                border-radius: 50%;
                background: #333;
                border: 1px solid #555;
            }

            .timeline-period {
                font-family: monospace;
                font-size: 0.78rem;
                color: #555;
                margin-bottom: 0.3rem;
            }

            .timeline-place {
                color: #bbb;
                font-size: 0.95rem;
                margin-bottom: 0.2rem;
            }

            .timeline-desc {
                color: #555;
                font-size: 0.82rem;
                font-family: monospace;
            }

            /* ── Contact (세로 스택, 테두리 없음 — 하프톤 배경만) ── */
            .contact-list {
                display: flex;
                flex-direction: column;
                gap: 0;
            }

            .contact-card {
                display: flex;
                flex-direction: column;
                gap: 0.3rem;
                padding: 1.2rem 1.4rem;
                text-decoration: none;
                background: transparent;
                pointer-events: auto;
            }

            .contact-service {
                font-family: monospace;
                font-size: 0.7rem;
                color: #444;
                text-transform: uppercase;
                letter-spacing: 0.12em;
                transition: color 0.25s;
            }

            .contact-handle {
                color: #aaa;
                font-size: 0.9rem;
                font-family: monospace;
                transition: color 0.25s;
            }

            .contact-card:hover .contact-service {
                color: #666;
            }

            .contact-card:hover .contact-handle {
                color: #ddd;
            }

            /* ── 모바일 ── */
            @media (max-width: 768px) {
                .profile-hero h1 {
                    font-size: 2.2rem;
                }
            }
        </style>
    </head>
    <body>
        <canvas id="halftone-canvas"></canvas>

        <main
            style="
                position: relative;
                z-index: 1;
                padding: 3rem;
                max-width: 680px;
                margin: 0 auto;
            "
        >
            <div id="profile-root"></div>
        </main>

        <script type="module" src="./profile.js"></script>
    </body>
</html>
