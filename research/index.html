<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>연구 기록</title>
        <link rel="stylesheet" href="../css/global.css" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/katex/dist/katex.min.css"
        />

        <style>
            #halftone-canvas {
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                z-index: -1;
                pointer-events: none;
            }

            /* 마크다운 본문 영역 */
            #content a {
                color: #888;
                text-decoration: none;
            }
            #content a:hover {
                color: #fff;
            }
        </style>
    </head>
    <body>
        <canvas id="halftone-canvas"></canvas>

        <main
            style="
                position: relative;
                z-index: 1;
                padding: 3rem;
                max-width: 800px;
                margin: 0 auto;
            "
        >
            <h1 style="font-size: 2rem; margin-bottom: 1rem">연구 기록</h1>
            <hr style="border-color: #2a2a2a; margin-bottom: 2rem" />

            <div id="content" style="line-height: 1.8">로딩 중...</div>
        </main>

        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/katex/dist/katex.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/katex/dist/contrib/auto-render.min.js"></script>

        <script type="module" src="./research.js"></script>
    </body>
</html>
